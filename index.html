<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GRH à l'ère de l'IA — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --navy: #0a1628; --accent: #c9a84c; --accent-light: #e8c97a; --white: #f8f6f0; --gray: #8899aa; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem; position: relative; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% 0%, #1a3a6e44 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 80% 90%, #c9a84c10 0%, transparent 60%); pointer-events: none; }
    body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    .card { position: relative; background: rgba(255,255,255,.03); border: 1px solid rgba(201,168,76,.2); max-width: 480px; width: 100%; padding: 3rem 2.5rem; animation: fadeUp .7s ease both; }
    @media (max-width: 520px) { .card { padding: 2rem 1.5rem; } }
    .logo-wrap { display: flex; align-items: center; justify-content: center; margin-bottom: 2.5rem; }
    .logo-img { width: 260px; max-width: 100%; border-radius: 8px; padding: .5rem 1rem; background: white; }
    .heading { text-align: center; margin-bottom: 2.5rem; }
    .heading h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .heading h1 em { font-style: italic; color: var(--accent); }
    .reg-form { display: flex; flex-direction: column; gap: 1.3rem; }
    .field { display: flex; flex-direction: column; gap: .45rem; }
    label { font-size: .65rem; letter-spacing: .25em; text-transform: uppercase; color: var(--accent); }
    input { background: rgba(255,255,255,.05); border: 1px solid rgba(201,168,76,.2); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 300; padding: .9rem 1.1rem; outline: none; width: 100%; border-radius: 2px; transition: border-color .2s, background .2s; }
    input:focus { border-color: var(--accent); background: rgba(201,168,76,.05); }
    .submit-btn { margin-top: .5rem; background: var(--accent); color: var(--navy); font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .85rem; letter-spacing: .18em; text-transform: uppercase; border: none; padding: 1rem; cursor: pointer; transition: background .25s, transform .2s; width: 100%; border-radius: 2px; }
    .submit-btn:hover { background: var(--accent-light); transform: translateY(-2px); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(5,10,20,.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: #0f1f3d; border: 1px solid var(--accent); max-width: 420px; width: 100%; padding: 2.8rem 2rem; text-align: center; transform: translateY(24px) scale(.97); transition: transform .4s cubic-bezier(.22,1,.36,1); }
    .modal-overlay.show .modal { transform: translateY(0) scale(1); }
    .modal-icon { font-size: 2.5rem; margin-bottom: 1.2rem; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: .8rem; }
    .modal p { color: #aabbd0; font-size: .88rem; line-height: 1.8; }
    .modal .name { color: var(--accent); font-weight: 500; }
    .accueil-box { margin: 1.8rem 0 1.2rem; border: 1px dashed rgba(201,168,76,.5); padding: 1.1rem 1.4rem; background: rgba(201,168,76,.06); }
    .accueil-box p { font-size: .82rem; color: var(--white); line-height: 1.7; }
    .accueil-badge { display: inline-block; background: var(--accent); color: var(--navy); font-weight: 500; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; padding: .55rem 1.6rem; margin-top: 1rem; }
    .modal-close { display: block; margin: 1.5rem auto 0; background: none; border: 1px solid rgba(255,255,255,.15); color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: .78rem; letter-spacing: .15em; text-transform: uppercase; padding: .55rem 1.5rem; cursor: pointer; transition: border-color .2s, color .2s; border-radius: 2px; }
    .modal-close:hover { border-color: var(--accent); color: var(--white); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="logo.jpeg" alt="LA GRH à l'ère de l'IA" class="logo-img" />
    </div>
    <div class="heading">
      <h1>GRH à l'ère de <em>l'IA</em></h1>
    </div>
    <form class="reg-form" id="regForm" onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="nom">Nom complet</label>
        <input type="text" id="nom" required />
      </div>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="tel">Téléphone</label>
        <input type="tel" id="tel" required />
      </div>
      <button type="submit" class="submit-btn">✦ &nbsp;S'inscrire</button>
    </form>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">🎟️</div>
      <h2>Inscription confirmée !</h2>
      <p>Merci <span class="name" id="modalName"></span>, votre place est réservée.</p>
      <div class="accueil-box">
        <p>Présentez ce message ou votre e-mail de confirmation au bureau d'accueil le jour de la conférence.</p>
      </div>
      <div class="accueil-badge">→ À présenter à l'accueil</div>
      <button class="modal-close" onclick="closeModal()">Fermer</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwosl2gTNuuY2C3Db4VoaevowGfXPWZ3SZ-dMtkXIX14cRRTYVqiccb-l_m9ibDBC080A/exec";

    async function handleSubmit(e) {
      e.preventDefault();
      const nom = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const tel = document.getElementById('tel').value.trim();
      const btn = document.querySelector('.submit-btn');
      btn.textContent = 'Envoi en cours…';
      btn.disabled = true;
      try {
        const url = SCRIPT_URL
          + "?nom=" + encodeURIComponent(nom)
          + "&email=" + encodeURIComponent(email)
          + "&tel=" + encodeURIComponent(tel);
        await fetch(url, { method: 'GET', mode: 'no-cors' });
      } catch(err) {
        console.error('Erreur:', err);
      }
      btn.textContent = "✦  S'inscrire";
      btn.disabled = false;
      document.getElementById('modalName').textContent = nom;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      document.getElementById('regForm').reset();
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
