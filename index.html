<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ForumRH·IA — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0a1628;
      --accent: #c9a84c;
      --accent-light: #e8c97a;
      --white: #f8f6f0;
      --gray: #8899aa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, #1a3a6e44 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, #c9a84c10 0%, transparent 60%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(201,168,76,.2);
      max-width: 480px;
      width: 100%;
      padding: 3rem 2.5rem;
      animation: fadeUp .7s ease both;
    }

    @media (max-width: 520px) { .card { padding: 2rem 1.5rem; } }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: .9rem;
      margin-bottom: 2.5rem;
      justify-content: center;
    }

    .logo-img {
      width: 260px;
      max-width: 100%;
      border-radius: 8px;
      padding: .5rem 1rem;
      background: white;
    }

    .heading {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: .5rem;
    }

    .heading h1 em { font-style: italic; color: var(--accent); }

    .heading p {
      color: var(--gray);
      font-size: .82rem;
      letter-spacing: .05em;
    }

    .reg-form { display: flex; flex-direction: column; gap: 1.3rem; }

    .field { display: flex; flex-direction: column; gap: .45rem; }

    label {
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--accent);
    }

    input {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(201,168,76,.2);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      font-weight: 300;
      padding: .9rem 1.1rem;
      outline: none;
      width: 100%;
      border-radius: 2px;
      transition: border-color .2s, background .2s;
    }

    input::placeholder { color: #3a5060; }

    input:focus {
      border-color: var(--accent);
      background: rgba(201,168,76,.05);
    }

    .submit-btn {
      margin-top: .5rem;
      background: var(--accent);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .85rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: none;
      padding: 1rem;
      cursor: pointer;
      transition: background .25s, transform .2s;
      width: 100%;
      border-radius: 2px;
    }

    .submit-btn:hover { background: var(--accent-light); transform: translateY(-2px); }
    .submit-btn:active { transform: translateY(0); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,10,20,.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }

    .modal-overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: #0f1f3d;
      border: 1px solid var(--accent);
      max-width: 420px;
      width: 100%;
      padding: 2.8rem 2rem;
      text-align: center;
      transform: translateY(24px) scale(.97);
      transition: transform .4s cubic-bezier(.22,1,.36,1);
    }

    .modal-overlay.show .modal { transform: translateY(0) scale(1); }

    .modal-icon { font-size: 2.5rem; margin-bottom: 1.2rem; }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: .8rem;
    }

    .modal p { color: #aabbd0; font-size: .88rem; line-height: 1.8; }
    .modal .name { color: var(--accent); font-weight: 500; }

    .accueil-box {
      margin: 1.8rem 0 1.2rem;
      border: 1px dashed rgba(201,168,76,.5);
      padding: 1.1rem 1.4rem;
      background: rgba(201,168,76,.06);
    }

    .accueil-box p { font-size: .82rem; color: var(--white); line-height: 1.7; }

    .accueil-badge {
      display: inline-block;
      background: var(--accent);
      color: var(--navy);
      font-weight: 500;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .55rem 1.6rem;
      margin-top: 1rem;
    }

    .modal-close {
      display: block;
      margin: 1.5rem auto 0;
      background: none;
      border: 1px solid rgba(255,255,255,.15);
      color: var(--gray);
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: .55rem 1.5rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      border-radius: 2px;
    }

    .modal-close:hover { border-color: var(--accent); color: var(--white); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
